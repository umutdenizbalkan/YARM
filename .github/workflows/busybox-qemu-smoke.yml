name: busybox-qemu-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  riscv64-busybox-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc
      - name: BusyBox QEMU smoke (non-blocking)
        run: scripts/qemu-riscv64-busybox-smoke.sh

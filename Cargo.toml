[package]
name = "yarm"
version = "0.1.0"
edition = "2024"

[dependencies]
[profile.release]
opt-level = "z"      # Optimize for minimum size
lto = true           # Enable Link Time Optimization
codegen-units = 1    # Allow LTO to perform maximum optimization
panic = "abort"      # Remove stack unwinding code (saves a lot of space)
strip = true         # Automatically strip symbols from the binary

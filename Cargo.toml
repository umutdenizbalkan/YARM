# SPDX-License-Identifier: Apache-2.0

[package]
name = "yarm"
version = "0.1.0"
edition = "2024"
autobins = false

[workspace]
members = [
    ".",
    "crates/yarm-ipc-abi",
    "crates/yarm-srv-common",
    "crates/yarm-kernel",
    "crates/yarm-control-plane-servers",
    "crates/yarm-fs-servers",
    "crates/yarm-network-servers",
    "crates/yarm-driver-servers",
    "crates/yarm-ui-servers",
    "crates/yarm-compat-servers",
]
resolver = "2"

[features]
default = ["hosted-dev"]
hosted-dev = []
posix-compat = []
linux-compat = ["posix-compat"]

[dependencies]
yarm-ipc-abi = { path = "crates/yarm-ipc-abi" }
yarm-kernel = { path = "crates/yarm-kernel" }
yarm-srv-common = { path = "crates/yarm-srv-common" }

[[bin]]
name = "core_profile_smoke"
path = "src/bin/core_profile_smoke.rs"
required-features = ["hosted-dev"]

[[bin]]
name = "kernel_boot"
path = "src/bin/kernel_boot.rs"

[profile.x86-none]
inherits = "release"
panic = "abort"
lto = "thin"

[profile.aarch64-none]
inherits = "release"
panic = "abort"
lto = "thin"

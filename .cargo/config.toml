[alias]
build-x86-none = "build --target targets/x86_64-yarm-none.json"
check-x86-none = "check --target targets/x86_64-yarm-none.json"
build-aarch64-none = "build --target targets/aarch64-yarm-none.json --no-default-features --bin kernel_boot --bin init_server"
check-aarch64-none = "check --target targets/aarch64-yarm-none.json --no-default-features --bin kernel_boot --bin init_server"
build-aarch64-yarm = "build --target targets/aarch64-yarm-none.json --no-default-features --bin kernel_boot --bin init_server"
build-riscv64-none = "build --target riscv64gc-unknown-none-elf --no-default-features --bin kernel_boot --bin init_server"
check-riscv64-none = "check --target riscv64gc-unknown-none-elf --no-default-features --bin kernel_boot --bin init_server"

# Use scripts/build-x86_64-none-bootstrap.sh for build-std custom-target builds.

[env]
YARM_X86_64_NONE_TARGET = "targets/x86_64-yarm-none.json"
YARM_AARCH64_NONE_TARGET = "targets/aarch64-yarm-none.json"
YARM_RISCV64_NONE_TARGET = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = ["-C", "link-arg=-Ttargets/riscv64-yarm-none.ld"]
